name: Push Notifications (Cron)

on:
  schedule:
    # 08:00 BRT = 11:00 UTC (horário de Brasília -3)
    - cron: '0 11 * * *'
  workflow_dispatch: # permite disparar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin --no-save

      - name: Write and fix service account key
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Escreve o valor bruto em arquivo (printf não interpreta escapes)
          printf '%s' "$SA_JSON" > /tmp/sa_raw.json

          # Script Node.js para ler, corrigir e re-serializar o JSON
          cat > /tmp/fix_sa.js << 'JSEOF'
const fs = require('fs');
const raw = fs.readFileSync('/tmp/sa_raw.json', 'utf8');

// Tenta direto
try {
  JSON.parse(raw);
  fs.writeFileSync('/tmp/sa.json', raw);
  console.log('JSON OK');
  process.exit(0);
} catch(e) {
  console.error('Corrigindo JSON:', e.message);
}

// Corrige caracteres de controle literais dentro de strings JSON
let out = '', inStr = false;
for (let i = 0; i < raw.length; i++) {
  const c = raw[i];
  // Preserva sequências de escape já existentes (ex: \\n)
  if (c === '\\' && i + 1 < raw.length) {
    out += c + raw[i + 1];
    i++;
    continue;
  }
  if (c === '"') inStr = !inStr;
  if (inStr && c === '\n')      { out += '\\n'; continue; }
  if (inStr && c === '\r')      { out += '\\r'; continue; }
  if (inStr && c === '\t')      { out += '\\t'; continue; }
  if (inStr && c.charCodeAt(0) < 32) { out += '\\u' + c.charCodeAt(0).toString(16).padStart(4,'0'); continue; }
  out += c;
}

try {
  const obj = JSON.parse(out);
  fs.writeFileSync('/tmp/sa.json', JSON.stringify(obj));
  console.log('JSON corrigido e salvo');
} catch(e2) {
  console.error('Falha ao corrigir JSON:', e2.message);
  // Debug: mostra trecho ao redor do erro
  const m = e2.message.match(/position (\d+)/);
  if (m) {
    const pos = parseInt(m[1]);
    console.error('Contexto:', JSON.stringify(out.slice(Math.max(0,pos-40), pos+40)));
  }
  process.exit(1);
}
JSEOF
          node /tmp/fix_sa.js

      - name: Executar script de notificação
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: node scripts/notify.mjs
