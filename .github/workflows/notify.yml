name: Push Notifications (Cron)

on:
  schedule:
    # 08:00 BRT = 11:00 UTC (horário de Brasília -3)
    - cron: '0 11 * * *'
  workflow_dispatch: # permite disparar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin --no-save

      - name: Write and fix service account key
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python3 << 'PYEOF'
          import os, json
          raw = os.environ['SA_JSON']
          # Tenta direto primeiro
          try:
              json.loads(raw)
              with open('/tmp/sa.json', 'w') as f: f.write(raw)
              print('JSON OK')
          except Exception as e:
              print(f'Fixing JSON: {e}')
              # Abordagem char-a-char: escapa controles literais dentro de strings
              fixed = []
              in_string = False
              i = 0
              while i < len(raw):
                  c = raw[i]
                  if c == '\\' and i + 1 < len(raw):
                      fixed.append(c)
                      fixed.append(raw[i+1])
                      i += 2
                      continue
                  if c == '"':
                      in_string = not in_string
                      fixed.append(c)
                  elif in_string and c == '\n':
                      fixed.append('\\n')
                  elif in_string and c == '\r':
                      fixed.append('\\r')
                  elif in_string and c == '\t':
                      fixed.append('\\t')
                  else:
                      fixed.append(c)
                  i += 1
              result = ''.join(fixed)
              json.loads(result)
              with open('/tmp/sa.json', 'w') as f: f.write(result)
              print('JSON corrigido e salvo')
          PYEOF

      - name: Executar script de notificação
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: node scripts/notify.mjs
