name: Push Notifications (Cron)

on:
  schedule:
    # 08:00 BRT = 11:00 UTC (horário de Brasília -3)
    - cron: '0 11 * * *'
  workflow_dispatch: # permite disparar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin --no-save

      - name: Write service account key
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Tenta base64 decode primeiro (formato recomendado)
          if echo "$SA_JSON" | base64 -d 2>/dev/null | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "$SA_JSON" | base64 -d > /tmp/sa.json
            echo "Decoded from base64"
          else
            # Fallback: trata como JSON direto, escapa newlines literais via node
            printf '%s' "$SA_JSON" > /tmp/sa_raw.json
            node -e "
              const fs = require('fs');
              const raw = fs.readFileSync('/tmp/sa_raw.json','utf8');
              try { JSON.parse(raw); fs.writeFileSync('/tmp/sa.json',raw); console.log('JSON OK'); }
              catch(e) {
                let o='',s=false;
                for(let i=0;i<raw.length;i++){
                  const c=raw[i];
                  if(c==='\\\\' && i+1<raw.length){o+=c+raw[++i];continue;}
                  if(c==='\"')s=!s;
                  if(s&&c==='\n'){o+='\\\\n';continue;}
                  if(s&&c==='\r'){o+='\\\\r';continue;}
                  if(s&&c.charCodeAt(0)<32){o+='\\\\u'+c.charCodeAt(0).toString(16).padStart(4,'0');continue;}
                  o+=c;
                }
                const obj=JSON.parse(o);
                fs.writeFileSync('/tmp/sa.json',JSON.stringify(obj));
                console.log('JSON fixed');
              }
            "
          fi

      - name: Executar script de notificação
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: node scripts/notify.mjs
