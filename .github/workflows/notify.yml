name: Push Notifications (Cron)

on:
  schedule:
    # 08:00 BRT = 11:00 UTC (horário de Brasília -3)
    - cron: '0 11 * * *'
  workflow_dispatch: # permite disparar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin --no-save

      - name: Write and fix service account key
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python3 << 'PYEOF'
          import os, json, re
          raw = os.environ['SA_JSON']
          try:
              json.loads(raw)
              with open('/tmp/sa.json', 'w') as f: f.write(raw)
              print('JSON OK')
          except Exception as e:
              print(f'Fixing JSON: {e}')
              # Corrige newlines literais dentro do valor private_key
              fixed = re.sub(
                  r'"private_key"\s*:\s*"([\s\S]*?)"(\s*[,}])',
                  lambda m: '"private_key": "' + m.group(1).replace('\n', '\\n') + '"' + m.group(2),
                  raw
              )
              json.loads(fixed)
              with open('/tmp/sa.json', 'w') as f: f.write(fixed)
              print('JSON corrigido e salvo')
          PYEOF

      - name: Executar script de notificação
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: node scripts/notify.mjs
